services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: mgk-jenkins:lts-jdk21-node22
    container_name: mgk-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8088:8080"
      - "50000:50000"
    environment:
      TZ: Asia/Seoul
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /Users/su_wo/Documents/GitHub/MGK:/workspace/MGK

volumes:
  jenkins_home:
